<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Autenticando...</title>
<style>
body{background:#080810;color:#e8d5a3;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.box{text-align:center;}
.spinner{width:40px;height:40px;border:3px solid #2a2a3a;border-top:3px solid #e8d5a3;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <div>Autenticando con Google...</div>
</div>
<script>
// Capturar token del hash inmediatamente
const hash = window.location.hash.substring(1);
const match = hash.match(/access_token=([^&]+)/);
if(match){
  const token = match[1];
  localStorage.setItem("pedro_token", token);
  localStorage.setItem("pedro_token_time", Date.now());
  // Redirigir al tracker
  window.location.replace("tracker-pedro.html");
} else {
  document.querySelector('.box').innerHTML = '<div style="color:#ef4444">Error: no se recibió token.<br><a href="tracker-pedro.html" style="color:#e8d5a3">Volver al tracker</a></div>';
}
</script>
</body>
</html>
